name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # এটি দিলে আপনি ম্যানুয়ালি রান করতে পারবেন

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Build APK
      run: |
        # Gradle wrapper তৈরি এবং বিল্ড রান করা
        gradle assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SystemOptimizer-APK
        path: app/build/outputs/apk/debug/app-debug.apk
