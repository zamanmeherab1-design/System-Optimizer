name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # এটি আপনাকে গিটহাব থেকে ম্যানুয়ালি রান করার সুযোগ দেবে

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission for Gradlew
      # যদি আপনার রিপোজিটরিতে gradlew ফাইল থাকে তবে এটি কাজ করবে
      run: chmod +x gradlew || true

    - name: Build with Gradle
      # এখানে --stacktrace যোগ করা হয়েছে যাতে এরর হলে বিস্তারিত বোঝা যায়
      run: |
        if [ -f "./gradlew" ]; then
          ./gradlew assembleDebug --stacktrace
        else
          gradle assembleDebug --stacktrace
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: System-Optimizer-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
